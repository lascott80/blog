title = 'Lawrence Scott'
enableRobotsTXT = true
cacheDir = '/Users/lascott/Development/blog/.hugo_cache'

[params]
description = 'The blog of a Disney fan and computer nerd.'
author = 'Lawrence Scott'
tagline = "Hi, I'm Lawrence!"
